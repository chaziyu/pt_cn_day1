<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>马大灯笼节 - 极限反转抽奖</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-color: #4a0404; /* 暗红舞台背景 */
            --gold: #d4af37;     /* 烫金装饰 */
            --slot-bg: #1a1a1a;
            --text-glow: 0 0 10px rgba(212, 175, 55, 0.8);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle, #7a0808 0%, #2b0000 100%);
            color: var(--gold);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .title {
            font-size: 3rem;
            margin-bottom: 30px;
            text-shadow: var(--text-glow);
            letter-spacing: 5px;
            font-weight: bold;
        }

        /* 老虎机主体 */
        .slot-machine {
            display: flex;
            gap: 20px;
            background: linear-gradient(145deg, #2a0000, #5a0000);
            padding: 30px;
            border: 5px solid var(--gold);
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5), inset 0 0 20px rgba(0,0,0,0.8);
            position: relative;
        }

        /* 单个数字框 */
        .reel-container {
            width: 120px;
            height: 160px;
            background-color: var(--slot-bg);
            border: 3px solid #8b6508;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 10px 20px rgba(0,0,0,0.8);
        }

        /* 顶部和底部的渐变阴影，增加滚轮的立体感 */
        .reel-container::before, .reel-container::after {
            content: '';
            position: absolute;
            left: 0;
            width: 100%;
            height: 30px;
            z-index: 2;
        }
        .reel-container::before {
            top: 0;
            background: linear-gradient(to bottom, rgba(26,26,26,1) 0%, rgba(26,26,26,0) 100%);
        }
        .reel-container::after {
            bottom: 0;
            background: linear-gradient(to top, rgba(26,26,26,1) 0%, rgba(26,26,26,0) 100%);
        }

        /* 数字长条 */
        .strip {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            /* 初始状态模糊，由 JS 控制 */
        }

        .number {
            height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 6rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 15px rgba(255,255,255,0.5);
        }

        /* 高速滚动时的视觉模糊类 */
        .blur-effect {
            filter: blur(4px) drop-shadow(0 0 10px rgba(255,255,255,0.8));
        }

        .controls {
            margin-top: 50px;
        }

        button {
            padding: 15px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(to bottom, #d4af37, #b8860b);
            color: #2b0000;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            transition: transform 0.1s, filter 0.2s;
        }

        button:hover {
            filter: brightness(1.2);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        button:disabled {
            background: #555;
            color: #888;
            cursor: not-allowed;
            transform: none;
        }
    </style>
</head>
<body>

    <div class="title">灯笼节幸运抽奖</div>

    <div class="slot-machine">
        <div class="reel-container"><div class="strip" id="strip-0"></div></div>
        <div class="reel-container"><div class="strip" id="strip-1"></div></div>
        <div class="reel-container"><div class="strip" id="strip-2"></div></div>
    </div>

    <div class="controls">
        <button id="start-btn">开始抽奖</button>
    </div>

    <script>
        // ==========================================
        // 配置区域 (Configuration)
        // ==========================================
        
        // 1. 设定中奖号码和假动作号码
        const actualWinningNumber = [1, 2, 7]; // 真实中奖号码 (127)
        // 假动作：前两位一样，最后一位故意错开一格 (比如停在 8，然后倒退回 7)
        const fakePeakNumber = [1, 2, 8];      

        // 2. 音效文件占位符 (请在同级目录下放入真实的 MP3 文件)
        // 如果没有文件，浏览器控制台会报错，但动画依然会执行
        const audioSources = { 
            reel: 'fast_reel.mp3',       // 高速齿轮转动声
            stop1: 'clack.mp3',          // 百位卡死“啪”声
            stop2: 'dong.mp3',           // 十位卡死“咚”声
            slowPulse: 'heartbeat.mp3',  // 越来越慢的心跳/滴答声
            fakeStop: 'pause.mp3',       // 假动作停顿音效
            snapBack: 'glitch.mp3',      // 卡带/弹簧断裂音效
            win: 'fanfare.mp3'           // 爆发中奖音乐
        };

        const audios = {};
        for (let key in audioSources) {
            audios[key] = new Audio(audioSources[key]);
            audios[key].preload = 'auto';
        }

        // ==========================================
        // 初始化老虎机 DOM
        // ==========================================
        const numHeight = 160; // 每个数字的高度 (px)
        const totalLoops = 5;  // 滚动圈数，决定了“条”的长度

        // 生成数字条的函数
        function buildStrip(stripId, targetNum, isLastDigit = false) {
            const stripEl = document.getElementById(`strip-${stripId}`);
            stripEl.innerHTML = '';
            
            // 构建一个很长的数字序列用于滚动
            // 顺序： 0, 1, 2...9, 0, 1... 结尾是我们的目标数字
            let sequence = [];
            for (let i = 0; i < totalLoops; i++) {
                for (let j = 0; j <= 9; j++) {
                    sequence.push(j);
                }
            }
            
            // 把目标数字及周围的数字拼接到最后
            if (!isLastDigit) {
                sequence.push(targetNum);
            } else {
                // 如果是个位数，它的序列结尾需要是： ...真实数字, 假动作数字
                // 例如：真实是 7，假动作是 8。那么条带最下方必须是 7，紧接着是 8。
                // 因为我们是往上滚动（y轴负向），显示窗口是从上往下看条带。
                // 所以 DOM 结构（从上到下）应该是： [..., 6, 7, 8]
                // 这样滚动到最底下时，先显示 7，再往下滚显示 8（假动作停住）。然后瞬间向上退格回到 7。
                sequence.push(actualWinningNumber[2]); // 7
                sequence.push(fakePeakNumber[2]);      // 8
            }

            sequence.forEach(num => {
                const div = document.createElement('div');
                div.className = 'number';
                div.innerText = num;
                stripEl.appendChild(div);
            });

            // 初始重置位置到最上方（显示第一个数字）
            gsap.set(stripEl, { y: 0 });
            return sequence.length;
        }

        const len0 = buildStrip(0, actualWinningNumber[0]);
        const len1 = buildStrip(1, actualWinningNumber[1]);
        const len2 = buildStrip(2, actualWinningNumber[2], true); // 个位数采用特殊构造

        // ==========================================
        // 核心动画逻辑 (GSAP Timeline)
        // ==========================================
        const startBtn = document.getElementById('start-btn');

        startBtn.addEventListener('click', () => {
            startBtn.disabled = true;
            
            // 播放狂飙启动音效
            audios.reel.loop = true;
            audios.reel.play().catch(e => console.log("音效未加载"));

            const strips = [
                document.getElementById('strip-0'),
                document.getElementById('strip-1'),
                document.getElementById('strip-2')
            ];

            // 添加视觉模糊
            strips.forEach(strip => strip.classList.add('blur-effect'));

            // 计算目标 Y 轴偏移量
            // (总长度 - 1) * 高度，即滚动到最后一个元素
            const targetY0 = -((len0 - 1) * numHeight); 
            const targetY1 = -((len1 - 1) * numHeight);
            
            // 个位数：倒数第二个是真实数字(7)，倒数第一个是假动作数字(8)
            const fakeY2 = -((len2 - 1) * numHeight); // 滚到 8
            const realY2 = -((len2 - 2) * numHeight); // 退回到 7

            const tl = gsap.timeline();

            // 1. 定格 1 (百位)： 3秒后瞬间卡死
            tl.to(strips[0], {
                y: targetY0,
                duration: 3,
                ease: "power2.inOut", // 前面加速，后面平滑减速定格
                onComplete: () => {
                    strips[0].classList.remove('blur-effect');
                    audios.stop1.play().catch(e=>{}); // 播放“啪”
                }
            });

            // 2. 定格 2 (十位)： 5秒后卡死
            tl.to(strips[1], {
                y: targetY1,
                duration: 5,
                ease: "power2.inOut",
                onComplete: () => {
                    strips[1].classList.remove('blur-effect');
                    audios.reel.pause(); // 停止高速齿轮音效
                    audios.stop2.play().catch(e=>{}); // 播放“咚”
                    audios.slowPulse.play().catch(e=>{}); // 开始播放心跳/滴答声
                }
            }, "<"); // "<" 表示与前一个动画同时开始

            // 3. 极限拉扯 (个位)：极慢的拖泥带水，滚向假动作数字
            tl.to(strips[2], {
                y: fakeY2,
                duration: 8, // 持续时间最长，营造极其缓慢的最后阶段
                ease: "power4.out", // 极强的减速效果，最后几格像爬一样
                onComplete: () => {
                    strips[2].classList.remove('blur-effect');
                    audios.slowPulse.pause();
                    audios.fakeStop.play().catch(e=>{});
                }
            }, "<");

            // 4. 假动作停顿：Timeline 在这里自然延时
            // (停留在 8，持续 1.8 秒，让人信以为真)
            tl.to({}, { duration: 1.8 }); 

            // 5. 巅峰反转：极其生硬、快速地倒退一格！
            tl.to(strips[2], {
                y: realY2, // 瞬间变回真实数字
                duration: 0.15, // 极短的时间，强调“断裂/生硬”感
                ease: "back.out(4)", // 强烈的回弹缓动，模拟弹簧崩断的视觉冲击
                onStart: () => {
                    audios.snapBack.play().catch(e=>{});
                },
                onComplete: () => {
                    // 6. 中奖爆发
                    audios.win.play().catch(e=>{});
                    triggerConfetti();
                    startBtn.innerText = "重新抽奖";
                    startBtn.disabled = false;
                    
                    // 重置逻辑绑定到下一次点击
                    startBtn.onclick = () => location.reload();
                }
            });
        });

        // 撒花特效函数
        function triggerConfetti() {
            var duration = 3000;
            var end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 5,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: ['#d4af37', '#ff0000', '#ffffff'] // 配合主题色的彩带
                });
                confetti({
                    particleCount: 5,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: ['#d4af37', '#ff0000', '#ffffff']
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }
    </script>
</body>
</html>
