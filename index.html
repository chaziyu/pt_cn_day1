<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>马大灯笼节 - 极致视觉抽奖</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-dark: #2a0404;
            --bg-center: #5e0b0b;
            --gold-light: #FBEA9D;
            --gold-mid: #D4AF37;
            --gold-dark: #997A15;
            --text-gold: linear-gradient(to bottom, #FFF3C4, #D4AF37, #997A15);
            --machine-bg: linear-gradient(145deg, #3a0808, #1a0202);
        }

        body {
            margin: 0;
            height: 100vh;
            /* 典雅的绛红色径向渐变背景 */
            background: radial-gradient(circle at 50% 30%, var(--bg-center) 0%, var(--bg-dark) 80%);
            font-family: "STKaiti", "KaiTi", "楷体", "Microsoft YaHei", serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            perspective: 1200px;
        }

        /* ================= 背景升空的灯笼群 ================= */
        .lantern-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .lantern {
            position: absolute;
            width: 45px;
            height: 55px;
            background: radial-gradient(ellipse at center, #ff8c00 0%, #d80000 80%);
            border-radius: 40% 40% 45% 45%;
            box-shadow: 0 0 30px rgba(255, 69, 0, 0.6), inset 0 0 10px rgba(255, 255, 0, 0.5);
            bottom: -100px;
            /* 升空与摇摆动画 */
            animation: float-up linear infinite, sway ease-in-out infinite alternate;
        }

        /* 灯笼的顶部和底部木质装饰与流苏 */
        .lantern::before {
            content: ''; position: absolute; top: -5px; left: 12px; width: 21px; height: 5px;
            background: #4a2511; border-radius: 2px;
        }
        .lantern::after {
            content: ''; position: absolute; bottom: -15px; left: 17px; width: 11px; height: 20px;
            background: repeating-linear-gradient(90deg, #d80000, #d80000 1px, transparent 1px, transparent 2px);
        }

        @keyframes float-up {
            0% { transform: translateY(0); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(-110vh); opacity: 0; }
        }
        @keyframes sway {
            0% { margin-left: -20px; }
            100% { margin-left: 20px; }
        }

        /* ================= 标题优化 ================= */
        .title-container {
            z-index: 10;
            text-align: center;
            margin-bottom: 50px;
            animation: breathe 4s ease-in-out infinite alternate;
        }
        @keyframes breathe {
            0% { transform: scale(1); filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.2)); }
            100% { transform: scale(1.02); filter: drop-shadow(0 0 25px rgba(212, 175, 55, 0.5)); }
        }
        
        .title {
            font-size: 5rem;
            /* 使用行楷或楷体，增加文化底蕴 */
            font-family: "STXingkai", "华文行楷", "STKaiti", "KaiTi", serif;
            background: var(--text-gold);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            font-weight: normal;
            letter-spacing: 10px;
            margin: 0;
            /* 沉稳的多层阴影，替代廉价的发光 */
            text-shadow: 
                2px 4px 4px rgba(0,0,0,0.6),
                0 0 50px rgba(212, 175, 55, 0.2);
        }

        .subtitle {
            font-family: "Microsoft YaHei", sans-serif;
            font-size: 1.4rem;
            color: var(--gold-light);
            letter-spacing: 18px;
            margin-top: 5px;
            opacity: 0.9;
        }

        /* ================= 机器主体优化 ================= */
        .machine-wrapper {
            position: relative;
            z-index: 10;
            padding: 40px;
            background: var(--machine-bg);
            border-radius: 20px;
            border: 2px solid #5a1515;
            box-shadow: 
                0 40px 80px rgba(0,0,0,0.8),
                inset 0 0 0 6px var(--bg-dark),
                inset 0 0 0 10px var(--gold-mid);
            transform-style: preserve-3d;
            transform: rotateX(8deg);
        }

        .machine-container {
            display: flex;
            gap: 25px;
            padding: 25px;
            background: #080000;
            border-radius: 12px;
            box-shadow: inset 0 0 50px rgba(0,0,0,1);
        }

        /* 视窗 - 玻璃反光更柔和 */
        .reel-window {
            width: 140px;
            height: 190px;
            background-color: #0d0202;
            border: 3px solid var(--gold-dark);
            border-radius: 10px;
            position: relative;
            perspective: 800px;
            overflow: hidden;
            box-shadow: inset 0 0 15px rgba(212, 175, 55, 0.15);
        }

        .reel-window::after {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 40%;
            background: linear-gradient(to bottom, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0) 100%);
            border-radius: 8px 8px 0 0; z-index: 20; pointer-events: none;
        }

        .reel-shadow {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, #000 0%, transparent 25%, transparent 75%, #000 100%);
            pointer-events: none; z-index: 10;
        }

        .cylinder {
            width: 100%; height: 100%; position: absolute; transform-style: preserve-3d;
        }

        .face {
            position: absolute; width: 140px; height: 140px; left: 0; top: 25px; 
            display: flex; align-items: center; justify-content: center;
            font-size: 7rem; font-weight: bold;
            font-family: 'Arial', sans-serif; /* 数字依然保持清晰的无衬线 */
            background: linear-gradient(to bottom, #fff, #f0f0f0);
            background-clip: text; -webkit-background-clip: text; color: transparent;
            text-shadow: 0 5px 15px rgba(0,0,0,0.8);
            backface-visibility: hidden;
        }

        /* ================= 按钮优化 ================= */
        .controls { margin-top: 60px; z-index: 10; }

        button {
            padding: 18px 70px;
            font-size: 2rem;
            font-family: "STKaiti", "KaiTi", serif;
            font-weight: bold;
            background: linear-gradient(to bottom, var(--gold-light), var(--gold-dark));
            color: var(--bg-dark);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 
                0 8px 0 #7A5C00, 
                0 15px 30px rgba(0,0,0,0.6);
            transition: all 0.15s;
            letter-spacing: 5px;
        }

        button:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
            box-shadow: 0 10px 0 #7A5C00, 0 20px 40px rgba(212, 175, 55, 0.4);
        }

        button:active {
            transform: translateY(8px);
            box-shadow: 0 0 0 #7A5C00, 0 5px 10px rgba(0,0,0,0.6);
        }

        button:disabled {
            background: #555; color: #aaa; box-shadow: 0 8px 0 #333; cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div class="lantern-container" id="lanterns"></div>

    <div class="title-container">
        <h1 class="title">马大灯笼节</h1>
        <div class="subtitle">终 极 幸 运 抽 奖</div>
    </div>

    <div class="machine-wrapper" id="machine">
        <div class="machine-container">
            <div class="reel-window"><div class="reel-shadow"></div><div class="cylinder" id="cyl-0"></div></div>
            <div class="reel-window"><div class="reel-shadow"></div><div class="cylinder" id="cyl-1"></div></div>
            <div class="reel-window"><div class="reel-shadow"></div><div class="cylinder" id="cyl-2"></div></div>
        </div>
    </div>

    <div class="controls">
        <button id="start-btn">开 始 抽 奖</button>
    </div>

    <script>
        // 生成背景漂浮灯笼
        const lanternContainer = document.getElementById('lanterns');
        for (let i = 0; i < 15; i++) {
            let lantern = document.createElement('div');
            lantern.className = 'lantern';
            lantern.style.left = `${Math.random() * 90 + 5}%`;
            // 随机大小、上升速度和摇摆速度
            lantern.style.transform = `scale(${Math.random() * 0.5 + 0.5})`;
            lantern.style.animationDuration = `${Math.random() * 10 + 10}s, ${Math.random() * 2 + 2}s`;
            lantern.style.animationDelay = `${Math.random() * 15}s, 0s`;
            lanternContainer.appendChild(lantern);
        }

        // 3D 轮盘构建
        const numFaces = 10;
        const anglePerFace = 360 / numFaces; 
        const radius = Math.round((140 / 2) / Math.tan(Math.PI / numFaces)); 

        function buildCylinder(cylinderId) {
            const cyl = document.getElementById(`cyl-${cylinderId}`);
            gsap.set(cyl, { z: -radius });
            for (let i = 0; i < numFaces; i++) {
                const face = document.createElement('div');
                face.className = 'face'; face.innerText = i; 
                face.style.transform = `rotateX(${-i * anglePerFace}deg) translateZ(${radius}px)`;
                cyl.appendChild(face);
            }
        }
        [0, 1, 2].forEach(buildCylinder);

        let currentAngles = [0, 0, 0];
        const startBtn = document.getElementById('start-btn');
        const machineWrapper = document.getElementById('machine');
        let isSpinning = false;

        startBtn.addEventListener('click', () => {
            if (isSpinning) return;
            isSpinning = true;
            startBtn.disabled = true; startBtn.innerText = "祈 福 中 ...";

            const randomRealNums = [
                Math.floor(Math.random() * 10),
                Math.floor(Math.random() * 10),
                Math.floor(Math.random() * 10)
            ];

            const cyls = [document.getElementById('cyl-0'), document.getElementById('cyl-1'), document.getElementById('cyl-2')];
            const baseLoops = 15; 
            
            const angle0 = currentAngles[0] + (baseLoops * 360) + ((randomRealNums[0] * anglePerFace) - (currentAngles[0] % 360) + 360) % 360;
            const angle1 = currentAngles[1] + ((baseLoops + 2) * 360) + ((randomRealNums[1] * anglePerFace) - (currentAngles[1] % 360) + 360) % 360;
            const realAngle2 = currentAngles[2] + ((baseLoops + 4) * 360) + ((randomRealNums[2] * anglePerFace) - (currentAngles[2] % 360) + 360) % 360;
            const fakeAngle2 = realAngle2 + anglePerFace; // 假动作多转一格

            const tl = gsap.timeline();

            // 1. 百位和十位正常定格
            tl.to(cyls[0], { rotationX: angle0, duration: 2.5, ease: "back.out(1.2)" }, 0);
            tl.to(cyls[1], { rotationX: angle1, duration: 4, ease: "back.out(1.2)" }, 0.5);

            // 2. 个位艰难爬向假号码
            tl.to(cyls[2], { rotationX: fakeAngle2 - 180, duration: 3, ease: "power1.in" }, 0.5);
            tl.to(cyls[2], { rotationX: fakeAngle2 - 36, duration: 2.5, ease: "power2.inOut" });   
            
            // 3. 稳稳地停在假号码上（持续 1.5 秒的心理战）
            tl.to(cyls[2], { 
                rotationX: fakeAngle2, 
                duration: 1.5, 
                ease: "power4.out"
            });
            tl.to({}, { duration: 1.5 }); // 屏息时刻

            // 4. 🔥 史诗级反转优化 🔥
            // A. 蓄力预判：齿轮像是不堪重负，还想往前挣扎一点点（微微增加 12 度角度）
            tl.to(cyls[2], {
                rotationX: fakeAngle2 + 12,
                duration: 0.4,
                ease: "power1.inOut"
            });

            // B. 沉重滑落：失去抓地力，重重砸回真实的号码，并伴随弹簧余震
            tl.to(cyls[2], {
                rotationX: realAngle2, 
                duration: 0.8,        // 时间拉长，告别 0.1秒的僵硬瞬移
                ease: "elastic.out(1.2, 0.4)", // 完美的机械弹簧阻尼回弹效果
                onStart: () => {
                    // 机器整体伴随一次重击震动反馈
                    gsap.fromTo(machineWrapper, 
                        {y: 20, rotationX: 12}, 
                        {y: 0, rotationX: 8, duration: 0.6, ease: "elastic.out(1.5, 0.3)"}
                    );
                },
                onComplete: () => {
                    triggerWinEffects();
                    currentAngles = [angle0, angle1, realAngle2];
                    setTimeout(() => {
                        startBtn.innerText = "开 始 抽 奖";
                        startBtn.disabled = false;
                        isSpinning = false;
                    }, 2000);
                }
            });
        });

        function triggerWinEffects() {
            var end = Date.now() + 5000;
            (function frame() {
                confetti({
                    particleCount: 8, angle: 60, spread: 80, origin: { x: 0, y: 0.7 },
                    colors: ['#D4AF37', '#ff1a1a', '#FBEA9D'], shapes: ['circle'] 
                });
                confetti({
                    particleCount: 8, angle: 120, spread: 80, origin: { x: 1, y: 0.7 },
                    colors: ['#D4AF37', '#ff1a1a', '#FBEA9D'], shapes: ['circle']
                });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }
    </script>
</body>
</html>
