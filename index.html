<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>马大灯笼节 PTUM - 3D赛博复古老虎机</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-dark: #1a0202;
            --neon-red: #ff2a2a;
            --neon-gold: #ffd700;
            --machine-bg: #2a0808;
            --border-gold: #b8860b;
        }

        body {
            margin: 0;
            height: 100vh;
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at center, #3a0000 0%, var(--bg-dark) 80%),
                linear-gradient(0deg, transparent 24%, rgba(255, 42, 42, 0.05) 25%, rgba(255, 42, 42, 0.05) 26%, transparent 27%, transparent 74%, rgba(255, 42, 42, 0.05) 75%, rgba(255, 42, 42, 0.05) 76%, transparent 77%, transparent), 
                linear-gradient(90deg, transparent 24%, rgba(255, 42, 42, 0.05) 25%, rgba(255, 42, 42, 0.05) 26%, transparent 27%, transparent 74%, rgba(255, 42, 42, 0.05) 75%, rgba(255, 42, 42, 0.05) 76%, transparent 77%, transparent);
            background-size: 100% 100%, 50px 50px, 50px 50px;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            perspective: 1200px; /* 开启全局 3D 视角 */
        }

        /* 赛博复古全息文字 */
        .title {
            font-size: 3.5rem;
            color: var(--neon-gold);
            text-transform: uppercase;
            letter-spacing: 10px;
            margin-bottom: 40px;
            text-shadow: 0 0 10px var(--neon-gold), 0 0 20px #ff0000, 0 0 40px #ff0000;
            animation: flicker 3s infinite alternate;
            z-index: 10;
        }

        /* 背景全息灯笼 (纯 CSS 效果) */
        .hologram-lantern {
            position: absolute;
            font-size: 8rem;
            color: rgba(255, 42, 42, 0.1);
            text-shadow: 0 0 20px rgba(255, 42, 42, 0.3);
            z-index: 0;
            animation: float 6s ease-in-out infinite;
            pointer-events: none;
        }
        .lantern-left { left: 10%; top: 20%; animation-delay: 0s; }
        .lantern-right { right: 10%; top: 30%; animation-delay: 3s; }

        /* 老虎机主体：3D 机械框 */
        .machine-container {
            display: flex;
            gap: 25px;
            padding: 40px;
            background: linear-gradient(135deg, #110000, var(--machine-bg));
            border: 4px solid var(--border-gold);
            border-radius: 20px;
            box-shadow: 
                0 0 30px rgba(255, 42, 42, 0.4),
                inset 0 0 40px rgba(0, 0, 0, 0.9),
                inset 0 0 10px var(--neon-gold);
            position: relative;
            z-index: 10;
            transform-style: preserve-3d;
            transform: rotateX(5deg); /* 整体微微后仰，增加机械感 */
        }

        /* 轮盘视窗容器 */
        .reel-window {
            width: 140px;
            height: 180px;
            background-color: #050000;
            border: 3px solid #5a3a00;
            border-radius: 12px;
            position: relative;
            perspective: 800px;
            overflow: hidden;
            box-shadow: inset 0 20px 40px rgba(0,0,0,1), inset 0 -20px 40px rgba(0,0,0,1);
        }

        /* 视窗上下黑色渐变遮罩，挡住圆柱体背面的数字 */
        .reel-window::before, .reel-window::after {
            content: '';
            position: absolute;
            left: 0; width: 100%; height: 50px; z-index: 5;
            pointer-events: none;
        }
        .reel-window::before { top: 0; background: linear-gradient(to bottom, #000 0%, transparent 100%); }
        .reel-window::after { bottom: 0; background: linear-gradient(to top, #000 0%, transparent 100%); }

        /* 3D 圆柱体 */
        .cylinder {
            width: 100%;
            height: 100%;
            position: absolute;
            transform-style: preserve-3d;
            /* 初始时不旋转 */
            transform: translateZ(-215px) rotateX(0deg); 
        }

        /* 圆柱体上的每一个数字面 */
        .face {
            position: absolute;
            width: 140px;
            height: 140px;
            left: 0;
            top: 20px; /* 居中对齐视窗 (180 - 140)/2 */
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 6.5rem;
            font-weight: 900;
            color: var(--neon-red);
            text-shadow: 0 0 10px var(--neon-red), 0 0 20px #8a0000;
            backface-visibility: hidden; /* 隐藏背面 */
        }

        .controls {
            margin-top: 60px;
            z-index: 10;
        }

        /* 机械霓虹按钮 */
        button {
            padding: 20px 50px;
            font-size: 1.8rem;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
            background: #2a0000;
            color: var(--neon-gold);
            border: 2px solid var(--neon-gold);
            border-radius: 10px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 6px 0 #8b6508, 0 0 20px rgba(255, 215, 0, 0.4);
            transition: all 0.1s;
            position: relative;
        }

        button:hover {
            background: #3a0000;
            box-shadow: 0 6px 0 #8b6508, 0 0 30px rgba(255, 215, 0, 0.7);
        }

        button:active {
            top: 6px;
            box-shadow: 0 0 0 #8b6508, 0 0 10px rgba(255, 215, 0, 0.4);
        }

        button:disabled {
            background: #111;
            color: #444;
            border-color: #444;
            box-shadow: none;
            cursor: not-allowed;
            top: 6px;
        }

        /* 动画定义 */
        @keyframes flicker {
            0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { text-shadow: 0 0 10px var(--neon-gold), 0 0 20px #ff0000, 0 0 40px #ff0000; }
            20%, 24%, 55% { text-shadow: none; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-30px); }
        }

        /* 胜利时的屏幕爆闪光效 */
        .win-flash {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 215, 0, 0.2);
            z-index: 999;
            pointer-events: none;
            opacity: 0;
        }
    </style>
</head>
<body>

    <div class="hologram-lantern lantern-left">🏮</div>
    <div class="hologram-lantern lantern-right">🏮</div>

    <div class="title">PTUM JACKPOT</div>

    <div class="machine-container">
        <div class="reel-window"><div class="cylinder" id="cyl-0"></div></div>
        <div class="reel-window"><div class="cylinder" id="cyl-1"></div></div>
        <div class="reel-window"><div class="cylinder" id="cyl-2"></div></div>
    </div>

    <div class="controls">
        <button id="start-btn">INITIATE_</button>
    </div>

    <div class="win-flash" id="flash"></div>

    <script>
        // ==========================================
        // 配置与音效映射
        // ==========================================
        const TARGET_REAL = [1, 2, 7]; // 真实中奖号码
        const TARGET_FAKE = [1, 2, 8]; // 假动作号码 (最后一位假装停在 8)

        const audios = { 
            fastReel: new Audio('fastReel.mp3'),   // 齿轮极速
            stop1: new Audio('stop1.mp3'),         // 砰！带金属余音
            stop2: new Audio('stop2.mp3'),         // 砰！带金属余音
            struggle: new Audio('struggle.mp3'),   // 齿轮卡壳摩擦声
            fakeStop: new Audio('fakeStop.mp3'),   // 完美假停顿滴答声
            snapBack: new Audio('snapBack.mp3'),   // 暴力卡带回弹声
            win: new Audio('win.mp3')              // 赛博风中奖爆发音乐
        };

        // ==========================================
        // 3D 几何与引擎初始化
        // ==========================================
        const numFaces = 10;
        const anglePerFace = 360 / numFaces; // 36度
        // 半径计算：r = (高度/2) / tan(18度)
        const radius = Math.round((140 / 2) / Math.tan(Math.PI / numFaces)); // 约 215px

        // 构建 3D 圆柱体
        function buildCylinder(cylinderId, startNum = 0) {
            const cyl = document.getElementById(`cyl-${cylinderId}`);
            cyl.innerHTML = '';
            
            // 设定 Z 轴后移，让圆柱体的前表面贴合视窗
            gsap.set(cyl, { z: -radius });

            for (let i = 0; i < numFaces; i++) {
                const face = document.createElement('div');
                face.className = 'face';
                // 让数字按照 0, 1, 2... 的顺序排列
                face.innerText = (startNum + i) % 10;
                
                // 3D 空间排布：
                // 如果向下滚动，前面的面应该向上去。
                // 面 i 旋转 -i * 36 度
                const rotateX = -i * anglePerFace;
                face.style.transform = `rotateX(${rotateX}deg) translateZ(${radius}px)`;
                cyl.appendChild(face);
            }
        }

        buildCylinder(0);
        buildCylinder(1);
        buildCylinder(2);

        // ==========================================
        // 核心动画：物理级时间线
        // ==========================================
        const startBtn = document.getElementById('start-btn');

        startBtn.addEventListener('click', () => {
            startBtn.disabled = true;
            
            // 尝试播放启动音效
            audios.fastReel.loop = true;
            audios.fastReel.play().catch(e => {});

            const cyls = [
                document.getElementById('cyl-0'),
                document.getElementById('cyl-1'),
                document.getElementById('cyl-2')
            ];

            // 基础滚动圈数 (增加机械感：转很多圈)
            const baseLoops = 15; 
            
            // 计算目标旋转角度
            // 当圆柱体旋转正向 angle 时，对应的 face (旋转了 -angle) 就会转到前面。
            const getTargetAngle = (targetNum, loops) => (loops * 360) + (targetNum * anglePerFace);

            const angle0 = getTargetAngle(TARGET_REAL[0], baseLoops);
            const angle1 = getTargetAngle(TARGET_REAL[1], baseLoops + 2);
            
            // 个位数需要算两个角度：假动作角度 和 真实角度
            const loops3 = baseLoops + 4;
            const fakeAngle = getTargetAngle(TARGET_FAKE[2], loops3);
            const realAngle = getTargetAngle(TARGET_REAL[2], loops3); // 注意：因为真实是7，假是8。7比8小36度。圆柱体往回转，完美契合“倒退”物理逻辑。

            const tl = gsap.timeline();

            // --- 启动时的后仰蓄力 (物理惯性) ---
            tl.to(cyls, { rotationX: -20, duration: 0.3, ease: "power1.inOut" });

            // --- 1. 定格百位：生硬带机械回弹 ---
            tl.to(cyls[0], {
                rotationX: angle0,
                duration: 2.5,
                ease: "back.out(1.2)", // 超过目标点再弹回来
                onComplete: () => { audios.stop1.play().catch(e=>{}); }
            });

            // --- 2. 定格十位：更长的缓冲，更重的定格 ---
            tl.to(cyls[1], {
                rotationX: angle1,
                duration: 4,
                ease: "back.out(1.5)",
                onComplete: () => { 
                    audios.fastReel.pause(); 
                    audios.stop2.play().catch(e=>{}); 
                    audios.struggle.play().catch(e=>{}); // 个位开始费力
                }
            }, "<0.5");

            // --- 3. 个位极限拉扯 (拆分为多段 Timeline 模拟卡壳) ---
            // A. 前半段正常极速滚
            tl.to(cyls[2], { rotationX: fakeAngle - 180, duration: 3, ease: "power1.in" }, 0.3);
            
            // B. 开始费力：像被异物卡住，一段一段地磨过去
            tl.to(cyls[2], { rotationX: fakeAngle - 72, duration: 1.5, ease: "power2.inOut" }); // 剩2格
            tl.to(cyls[2], { rotationX: fakeAngle - 36, duration: 2, ease: "power1.inOut" });   // 剩1格，极度缓慢
            
            // C. 假动作定格：沉重地咬合进去
            tl.to(cyls[2], { 
                rotationX: fakeAngle, 
                duration: 1.5, 
                ease: "power4.out", // 极强减速，仿佛彻底没力气了
                onComplete: () => {
                    audios.struggle.pause();
                    audios.fakeStop.play().catch(e=>{});
                }
            });

            // --- 4. 屏息停顿 2 秒 ---
            tl.to({}, { duration: 2 });

            // --- 5. 巅峰暴力反转 ---
            tl.to(cyls[2], {
                rotationX: realAngle, // 瞬间将角度从 8 退回 7
                duration: 0.1,        // 0.1秒极限速度
                ease: "back.out(4)",  // GSAP Back 缓动参数拉满，产生“啪”的断裂暴力回弹视觉
                onStart: () => { audios.snapBack.play().catch(e=>{}); },
                onComplete: () => {
                    audios.win.play().catch(e=>{});
                    triggerCyberWin();
                    startBtn.innerText = "SYSTEM_REBOOT";
                    startBtn.disabled = false;
                    startBtn.onclick = () => location.reload();
                }
            });
        });

        // ==========================================
        // 赛博中奖特效
        // ==========================================
        function triggerCyberWin() {
            // 屏幕爆闪
            gsap.to("#flash", { opacity: 1, duration: 0.1, yoyo: true, repeat: 5 });
            // 老虎机霓虹狂闪
            gsap.to(".machine-container", {
                boxShadow: "0 0 80px #ffd700, inset 0 0 60px #ff0000",
                borderColor: "#ff2a2a",
                duration: 0.2,
                yoyo: true,
                repeat: -1
            });
            // 撒出红金相间的纸片
            var duration = 4000;
            var end = Date.now() + duration;
            (function frame() {
                confetti({
                    particleCount: 8, angle: 60, spread: 80, origin: { x: 0, y: 0.8 },
                    colors: ['#ff2a2a', '#ffd700', '#8a0000'],
                    shapes: ['square'] // 赛博风用方形纸片
                });
                confetti({
                    particleCount: 8, angle: 120, spread: 80, origin: { x: 1, y: 0.8 },
                    colors: ['#ff2a2a', '#ffd700', '#8a0000'],
                    shapes: ['square']
                });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }
    </script>
</body>
</html>
