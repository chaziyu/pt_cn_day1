<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>马大灯笼节 - 幸运抽奖</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Cinzel:wght@900&display=swap');

        :root {
            --primary-gold: #ffdd44;
            --primary-red: #ff3333;
            --gold-dark: #b8860b;
            --machine-housing: linear-gradient(145deg, #3a0b0b, #110000);
        }

        html, body {
            width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden;
            position: fixed; top: 0; left: 0; background-color: #000;
            background: radial-gradient(circle at center, #4a0e0e 0%, #1a0505 50%, #000000 100%);
            font-family: 'Cinzel', serif; color: white;
            user-select: none; -webkit-user-select: none; cursor: default;
        }

        /* --- LAYER 1: GOD RAYS (Back) --- */
        .god-rays {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 150vmax; height: 150vmax;
            background: repeating-conic-gradient(rgba(255, 235, 150, 0.15) 0deg, rgba(255, 235, 150, 0.15) 15deg, transparent 15deg, transparent 30deg);
            box-shadow: 0 0 100px 80px rgba(255, 200, 50, 0.2);
            mix-blend-mode: screen; animation: rotateRays 60s linear infinite;
            z-index: 1; pointer-events: none;
        }
        @keyframes rotateRays { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }
        .god-rays.pulsing { animation: rotateRays 60s linear infinite, rayPulse 2s ease-in-out infinite alternate; }
        @keyframes rayPulse { 0% { opacity: 0.3; filter: brightness(1.0); } 100% { opacity: 0.8; filter: brightness(1.5); } }

        /* --- LAYER 2: LANTERNS (DYNAMIC) --- */
        #lantern-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 2; transition: z-index 0.1s step-end; }
        body.winner-revealed #lantern-canvas { z-index: 25; }

        /* --- LAYER 3: GREY GLASS BACKDROP --- */
        #glass-backdrop {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 5, 5, 0.8); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            z-index: 20; opacity: 0; pointer-events: none; transition: opacity 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }
        #glass-backdrop.visible { opacity: 1; }

        /* --- LAYER 4: TEXT CONTENT & SLOT MACHINE --- */
        .content-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 30; opacity: 0; pointer-events: none; transition: opacity 0.4s;
            perspective: 1200px;
        }
        .content-layer.visible { opacity: 1; pointer-events: auto; }

        /* --- LAYER 5: FIREWORKS --- */
        #firework-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 40; pointer-events: none; }

        /* --- STYLING (Title & Controls) --- */
        #main-title {
            position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; z-index: 10; pointer-events: none; padding: 5vh 8vw; width: max-content;
            background: linear-gradient(145deg, rgba(40, 20, 20, 0.85), rgba(10, 5, 5, 0.95));
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-radius: 24px; border: 1px solid rgba(255, 215, 0, 0.15);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8); transition: all 0.6s ease;
        }
        .title-chinese {
            font-family: 'Ma Shan Zheng', cursive; font-size: 5vw; color: var(--primary-gold); margin: 0;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.8), 0 0 40px rgba(255, 160, 0, 0.8); letter-spacing: 12px; white-space: nowrap;
        }
        .title-english {
            font-family: 'Cinzel', serif; font-size: 1.2vw; color: #ffbfbf; letter-spacing: 8px; margin-top: 15px;
            text-shadow: 0 0 15px rgba(255, 50, 50, 0.8); opacity: 0.95; white-space: nowrap;
        }

        #controls { position: absolute; bottom: 10%; left: 50%; transform: translateX(-50%); z-index: 40; transition: opacity 0.5s ease; }
        
        button {
            background: linear-gradient(to bottom, #c0151a, #660000); border: 2px solid rgba(255, 215, 0, 0.6);
            padding: 15px 70px; font-size: 28px; font-family: 'Ma Shan Zheng', cursive; color: var(--primary-gold);
            cursor: pointer; border-radius: 50px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); text-shadow: 2px 2px 0px rgba(0, 0, 0, 0.8); letter-spacing: 3px; white-space: nowrap;
        }
        button:hover { transform: scale(1.05); box-shadow: 0 0 80px rgba(255, 200, 0, 0.6); }
        button:active { transform: scale(0.95); }
        button:disabled { filter: grayscale(1); cursor: not-allowed; opacity: 0.5; transform: none; box-shadow: none; }

        .vignette { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 3; background: radial-gradient(circle, transparent 40%, rgba(0, 0, 0, 0.9) 100%); }
        #flash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 100; pointer-events: none; opacity: 0;
            transition: opacity 0.8s ease-out; mix-blend-mode: overlay;
        }

        /* ================= 老虎机外壳与拉杆核心样式 ================= */
        
        /* 增加顶部拱门设计的经典老虎机外壳 */
        .machine-wrapper {
            position: relative; 
            padding: 40px; 
            padding-top: 60px;
            background: var(--machine-housing);
            border-radius: 30px 30px 20px 20px; 
            border: 3px solid var(--gold-dark);
            box-shadow: 0 40px 80px rgba(0,0,0,0.9), inset 0 20px 40px rgba(255, 215, 0, 0.15);
            transform-style: preserve-3d; 
            transform: rotateX(5deg);
            margin-right: 80px; /* 为右侧拉杆预留空间 */
        }

        /* 顶部跑马灯装饰牌 */
        .machine-wrapper::before {
            content: "🎰 JACKPOT 🎰"; 
            position: absolute; 
            top: 15px; 
            left: 50%; 
            transform: translateX(-50%);
            color: #ffdd44;
            font-family: 'Cinzel', serif; 
            font-size: 1.8rem;
            font-weight: 900;
            text-shadow: 0 0 10px #ff0000, 0 0 20px #ff0000;
            letter-spacing: 5px;
        }

        .machine-container {
            display: flex; gap: 25px; padding: 25px; 
            background: #000;
            border-radius: 12px; 
            box-shadow: inset 0 0 50px rgba(0,0,0,1), 0 5px 15px rgba(255, 215, 0, 0.2);
            border: 2px solid #331111;
        }

        /* ================= 物理拉杆 (Lever) ================= */
        .slot-lever-container {
            position: absolute;
            right: -80px; /* 附着在机器右侧 */
            top: 50%;
            transform: translateY(-30%);
            width: 80px;
            height: 250px;
            perspective: 800px; /* 关键：让拉下动作产生 3D 透视 */
            z-index: -1; /* 藏在机壳后面一点点更真实 */
        }

        /* 拉杆底座/铰链 */
        .lever-base {
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 40px;
            height: 80px;
            background: linear-gradient(to right, #222, #555, #222);
            border-radius: 10px;
            border: 2px solid #111;
            box-shadow: -5px 5px 15px rgba(0,0,0,0.8);
            z-index: 2;
        }

        /* 金属杆身 */
        .lever-arm {
            position: absolute;
            bottom: 60px; /* 旋转支点 */
            left: 10px;
            width: 20px;
            height: 180px;
            background: linear-gradient(to right, #999, #fff, #777);
            border-radius: 10px;
            transform-origin: bottom center; /* 关键：绕底部旋转 */
            transform-style: preserve-3d;
            box-shadow: -5px 0 10px rgba(0,0,0,0.5);
            z-index: 1;
            cursor: pointer;
        }

        /* 红宝石把手 */
        .lever-knob {
            position: absolute;
            top: -30px;
            left: -15px;
            width: 50px;
            height: 50px;
            background: radial-gradient(circle at 30% 30%, #ff6666, #cc0000, #4a0000);
            border-radius: 50%;
            box-shadow: 0 10px 20px rgba(0,0,0,0.8), inset 0 -5px 15px rgba(0,0,0,0.5);
            border: 2px solid #800000;
            transition: filter 0.2s;
        }
        
        .lever-arm:hover .lever-knob {
            filter: brightness(1.2);
            box-shadow: 0 0 20px #ff0000;
        }

        /* ================= 滚轮视窗 ================= */
        .reel-window {
            width: 140px; height: 190px; background-color: #0d0202;
            border: 3px solid var(--gold-dark); border-radius: 10px; position: relative;
            perspective: 800px; overflow: hidden; box-shadow: inset 0 0 20px rgba(255, 51, 51, 0.2);
        }
        .reel-window::after {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 40%;
            background: linear-gradient(to bottom, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 100%);
            border-radius: 8px 8px 0 0; z-index: 20; pointer-events: none;
        }
        .reel-shadow {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.95) 0%, transparent 25%, transparent 75%, rgba(0,0,0,0.95) 100%);
            pointer-events: none; z-index: 10;
        }
        .cylinder { width: 100%; height: 100%; position: absolute; transform-style: preserve-3d; }
        .face {
            position: absolute; width: 140px; height: 140px; left: 0; top: 25px;
            display: flex; align-items: center; justify-content: center;
            font-size: 7.5rem; font-weight: 900; color: #fff;
            text-shadow: 0 0 20px var(--primary-gold), 0 0 40px var(--primary-red);
            backface-visibility: hidden; font-family: 'Cinzel', serif;
        }
    </style>
</head>

<body>

    <audio id="sfx-storm" src="storm.mp3" preload="auto"></audio>
    <audio id="sfx-boom" src="boom.mp3" preload="auto"></audio>

    <div id="flash"></div>
    <div class="vignette"></div>
    <div class="god-rays"></div>

    <div id="glass-backdrop"></div>
    <canvas id="lantern-canvas"></canvas>

    <div id="main-title">
        <h1 class="title-chinese">马大灯笼节</h1>
        <div class="title-english">PESTA TANGLUNG UM</div>
        <div class="title-sub">Grand Lucky Draw</div>
    </div>

    <div id="machine-screen" class="content-layer">
        <div class="machine-wrapper" id="machine">
            
            <div class="slot-lever-container">
                <div class="lever-base"></div>
                <div class="lever-arm" id="lever-arm" onclick="startDraw()">
                    <div class="lever-knob"></div>
                </div>
            </div>

            <div class="machine-container">
                <div class="reel-window"><div class="reel-shadow"></div><div class="cylinder" id="cyl-0"></div></div>
                <div class="reel-window"><div class="reel-shadow"></div><div class="cylinder" id="cyl-1"></div></div>
                <div class="reel-window"><div class="reel-shadow"></div><div class="cylinder" id="cyl-2"></div></div>
            </div>
        </div>
    </div>

    <canvas id="firework-canvas"></canvas>

    <div id="controls">
        <button id="ignite-btn" onclick="startDraw()">⚡ 启 动 ⚡</button>
    </div>

    <script>
        // ==========================================
        // 原始 Canvas 渲染核心 (保留)
        // ==========================================
        const Config = {
            totalParticipants: 450, lanternCount: 65, baseSpeed: 1.5, stormMaxSpeed: 30.0,
            fireworksCount: 60, confettiCount: 80   
        };
        const State = { mode: 'IDLE', width: 0, height: 0, globalSpeedMultiplier: 1.0, lastTime: 0 };
        const lanternCache = []; const particleCache = []; 

        function preRenderLanterns() {
            const cacheCount = 12;
            for (let i = 0; i < cacheCount; i++) {
                const size = 42 + Math.random() * 26.25;
                const c = document.createElement('canvas'); c.width = size * 3; c.height = size * 4;
                const ctx = c.getContext('2d'); ctx.translate(size * 1.5, size * 1.5);
                const hue = Math.floor(Math.random() * 40); ctx.shadowBlur = 40; ctx.shadowColor = `hsla(${hue}, 100%, 60%, 0.8)`;
                const w = size * 0.55; const h = size * 0.75; const grd = ctx.createLinearGradient(-w / 2, -h / 2, w / 2, h / 2);
                grd.addColorStop(0, `hsla(${hue}, 100%, 70%, 1)`); grd.addColorStop(1, `hsla(${hue}, 100%, 50%, 1)`);
                ctx.beginPath(); ctx.moveTo(-w / 2, -h / 2); ctx.lineTo(w / 2, -h / 2); ctx.lineTo(w / 3, h / 2); ctx.lineTo(-w / 3, h / 2); ctx.closePath(); ctx.fillStyle = grd; ctx.fill();
                ctx.shadowBlur = 0; ctx.strokeStyle = "rgba(255, 255, 220, 0.7)"; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.moveTo(-w / 2, -h / 2); ctx.lineTo(-w / 3, h / 2); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(w / 2, -h / 2); ctx.lineTo(w / 3, h / 2); ctx.stroke();
                ctx.shadowBlur = 20; ctx.shadowColor = "#fff"; ctx.beginPath(); ctx.arc(0, h / 4, w / 5, 0, Math.PI * 2); ctx.fillStyle = "#fff"; ctx.fill();
                lanternCache.push({ img: c, width: c.width, height: c.height });
            }
        }
        function preRenderParticles() {
            const hues = []; for (let i = 0; i <= 20; i += 2) hues.push(i); for (let i = 40; i <= 60; i += 2) hues.push(i);
            hues.forEach(hue => {
                const size = 16; const c = document.createElement('canvas'); c.width = size; c.height = size;
                const ctx = c.getContext('2d'); const center = size / 2; const radius = size * 0.25; 
                const grad = ctx.createRadialGradient(center, center, 0, center, center, size / 2);
                grad.addColorStop(0, `hsla(${hue}, 100%, 70%, 1)`); grad.addColorStop(0.4, `hsla(${hue}, 100%, 50%, 0.8)`); grad.addColorStop(1, `hsla(${hue}, 100%, 50%, 0)`);
                ctx.fillStyle = grad; ctx.fillRect(0, 0, size, size);
                ctx.beginPath(); ctx.arc(center, center, radius * 0.6, 0, Math.PI * 2); ctx.fillStyle = "#fff"; ctx.fill();
                particleCache.push({ img: c, size: size, hue: hue });
            });
        }

        class Lantern {
            constructor() { this.reset(); this.y = Math.random() * State.height; this.swingPhase = Math.random() * Math.PI * 2; }
            reset() { this.x = Math.random() * State.width; this.y = State.height + Math.random() * 200; this.baseSpeed = Math.random() * 0.5 + 0.5; this.sprite = lanternCache[Math.floor(Math.random() * lanternCache.length)]; this.swingPhase = Math.random() * Math.PI * 2; this.swingSpeed = 0.02 + Math.random() * 0.02; this.scale = 0.9 + Math.random() * 0.5; }
            update(dt) { let speed = this.baseSpeed * State.globalSpeedMultiplier * dt; this.y -= speed; if (State.mode === 'WINNER') { this.swingPhase += this.swingSpeed * 0.1 * dt; } else { this.swingPhase += this.swingSpeed * dt; this.x += Math.sin(this.swingPhase * 0.5) * 0.2 * dt; } if (this.x > State.width + 50) this.x = -50; if (this.y < -150) this.reset(); }
            draw(ctx) { ctx.translate(this.x, this.y); ctx.rotate(Math.sin(this.swingPhase) * 0.1); ctx.scale(this.scale, this.scale); ctx.drawImage(this.sprite.img, -this.sprite.width / 2, -this.sprite.height / 2); ctx.setTransform(1, 0, 0, 1, 0, 0); }
        }

        class Particle {
            constructor(x, y, isConfetti = false) { this.init(x, y, isConfetti); }
            init(x, y, isConfetti) {
                this.x = x; this.y = y; this.isConfetti = isConfetti; this.life = 1.0;
                if (!isConfetti) { this.maxHistory = 8; if (!this.historyX) { this.historyX = new Float32Array(this.maxHistory); this.historyY = new Float32Array(this.maxHistory); } this.historyIdx = 0; this.historyLen = 0; }
                const angle = Math.random() * Math.PI * 2;
                if (isConfetti) { this.vx = (Math.random() - 0.5) * 5; this.vy = (Math.random() - 0.5) * 5 - 5; this.drag = 0.95; this.gravity = 0.15; this.decay = 0.005; this.size = Math.random() * 5 + 3; this.color = `hsl(${40 + Math.random() * 20}, 100%, 75%)`; this.rotation = Math.random() * Math.PI; this.rotationSpeed = (Math.random() - 0.5) * 0.2; } 
                else { const speed = Math.random() * 18 + 12; this.vx = Math.cos(angle) * speed; this.vy = Math.sin(angle) * speed; this.drag = 0.92; this.gravity = 0.15; this.decay = Math.random() * 0.015 + 0.01; this.sprite = particleCache[Math.floor(Math.random() * particleCache.length)]; this.size = this.sprite.size * (0.8 + Math.random() * 0.4); this.color = `hsl(${this.sprite.hue}, 100%, 70%)`; }
            }
            update(dt) {
                if (!this.isConfetti) { this.historyX[this.historyIdx] = this.x; this.historyY[this.historyIdx] = this.y; this.historyIdx = (this.historyIdx + 1) & 7; if (this.historyLen < this.maxHistory) this.historyLen++; }
                this.x += this.vx * dt; this.y += this.vy * dt; this.vx *= this.drag; this.vy *= this.drag; this.vy += this.gravity * dt; this.life -= this.decay * dt; if (this.isConfetti) this.rotation += this.rotationSpeed * dt;
            }
            draw(ctx) {
                const alpha = Math.max(0, this.life); ctx.globalAlpha = alpha;
                if (this.isConfetti) { ctx.fillStyle = this.color; const c = Math.cos(this.rotation); const s = Math.sin(this.rotation); ctx.setTransform(c, s, -s, c, (this.x | 0), (this.y | 0)); ctx.fillRect(-this.size / 2, -this.size / 2, this.size, this.size); ctx.setTransform(1, 0, 0, 1, 0, 0); } 
                else { if (this.historyLen > 1) { ctx.beginPath(); let startIdx = (this.historyIdx - this.historyLen + 8) & 7; ctx.moveTo((this.historyX[startIdx] | 0), (this.historyY[startIdx] | 0)); for (let i = 1; i < this.historyLen; i++) { let currIdx = (startIdx + i) & 7; ctx.lineTo((this.historyX[currIdx] | 0), (this.historyY[currIdx] | 0)); } ctx.lineTo((this.x | 0), (this.y | 0)); ctx.lineWidth = this.size * 0.15; ctx.strokeStyle = this.color; ctx.stroke(); } const offset = this.size / 2; ctx.drawImage(this.sprite.img, (this.x - offset) | 0, (this.y - offset) | 0, this.size, this.size); }
                ctx.globalAlpha = 1.0;
            }
        }

        const lCanvas = document.getElementById('lantern-canvas'); const lCtx = lCanvas.getContext('2d');
        const fCanvas = document.getElementById('firework-canvas'); const fCtx = fCanvas.getContext('2d');
        const lanterns = []; let particles = []; const particlePool = []; 

        function init() {
            resize(); preRenderLanterns(); preRenderParticles(); 
            for (let i = 0; i < Config.lanternCount; i++) lanterns.push(new Lantern());
            requestAnimationFrame(loop);
        }

        function resize() {
            State.width = window.innerWidth; State.height = window.innerHeight;
            lCanvas.width = State.width; lCanvas.height = State.height; fCanvas.width = State.width; fCanvas.height = State.height;
            lCtx.globalCompositeOperation = 'lighter'; fCtx.globalCompositeOperation = 'lighter'; fCtx.lineCap = 'round';
        }
        window.addEventListener('resize', resize);

        function loop(timestamp) {
            if (!State.lastTime) State.lastTime = timestamp;
            const deltaTime = (timestamp - State.lastTime) / 16.67; State.lastTime = timestamp; const dt = Math.min(deltaTime, 3.0);
            let targetMultiplier = 1.0;
            if (State.mode === 'STORM') targetMultiplier = Config.stormMaxSpeed;
            if (State.mode === 'WINNER') targetMultiplier = 0.5; 
            State.globalSpeedMultiplier += (targetMultiplier - State.globalSpeedMultiplier) * 0.05 * dt;

            lCtx.clearRect(0, 0, State.width, State.height);
            for (let i = 0; i < lanterns.length; i++) { lanterns[i].update(dt); lanterns[i].draw(lCtx); }
            if (particles.length > 0) {
                fCtx.clearRect(0, 0, State.width, State.height);
                let i = 0;
                while (i < particles.length) {
                    const p = particles[i]; p.update(dt); p.draw(fCtx);
                    if (p.life <= 0) { particlePool.push(p); particles[i] = particles[particles.length - 1]; particles.pop(); } 
                    else { i++; }
                }
            }
            requestAnimationFrame(loop);
        }

        // ==========================================
        // 物理拉杆与老虎机 GSAP 动画核心
        // ==========================================
        const els = {
            glass: document.getElementById('glass-backdrop'),
            machineScreen: document.getElementById('machine-screen'),
            machineWrapper: document.getElementById('machine'),
            igniteBtn: document.getElementById('ignite-btn'),
            title: document.getElementById('main-title'),
            flash: document.getElementById('flash'),
            godRays: document.querySelector('.god-rays'),
            leverArm: document.getElementById('lever-arm')
        };
        const sfxStorm = document.getElementById('sfx-storm');
        const sfxBoom = document.getElementById('sfx-boom');

        const numFaces = 10;
        const anglePerFace = 360 / numFaces; 
        const radius = Math.round((140 / 2) / Math.tan(Math.PI / numFaces));

        function buildCylinder(cylinderId) {
            const cyl = document.getElementById(`cyl-${cylinderId}`);
            cyl.innerHTML = ''; gsap.set(cyl, { z: -radius });
            for (let i = 0; i < numFaces; i++) {
                const face = document.createElement('div');
                face.className = 'face'; face.innerText = i; 
                face.style.transform = `rotateX(${-i * anglePerFace}deg) translateZ(${radius}px)`;
                cyl.appendChild(face);
            }
        }
        buildCylinder(0); buildCylinder(1); buildCylinder(2);

        let currentAngles = [0, 0, 0];
        let isSpinning = false;

        function startDraw() {
            if (isSpinning) return;
            isSpinning = true;

            // 1. UI 切换
            els.igniteBtn.disabled = true;
            els.igniteBtn.innerText = "祈 福 中 ...";
            els.title.style.opacity = '0';
            els.title.style.transform = 'translate(-50%, -50%) scale(0.8)';
            
            els.godRays.classList.add('pulsing');
            els.glass.classList.add('visible');
            els.machineScreen.classList.add('visible');
            
            // ===================================
            // 🔥 拉杆物理动画 🔥
            // ===================================
            const leverTl = gsap.timeline();
            // 阶段 1: 用力往下拉 (rotateX 从 0 变到 70 度)
            leverTl.to(els.leverArm, { rotationX: 75, duration: 0.25, ease: "power2.in" })
            // 阶段 2: 松手，猛烈回弹 (带有弹簧阻尼效果)
                   .to(els.leverArm, { rotationX: -10, duration: 0.5, ease: "elastic.out(1.5, 0.4)" })
            // 阶段 3: 归位平息
                   .to(els.leverArm, { rotationX: 0, duration: 0.2, ease: "power1.inOut" });

            // 拉下拉杆的瞬间触发音效和卷轴滚动
            setTimeout(() => {
                try { sfxStorm.currentTime = 0; sfxStorm.play(); } catch (e) { }
                State.mode = 'STORM'; 
                startReels();
            }, 250); // 延迟 250ms，完美匹配拉杆被拉到底的那一帧
        }

        function startReels() {
            const targetStr = Math.floor(Math.random() * Config.totalParticipants).toString().padStart(3, '0');
            const targetNums = [parseInt(targetStr[0]), parseInt(targetStr[1]), parseInt(targetStr[2])];

            const cyls = [document.getElementById('cyl-0'), document.getElementById('cyl-1'), document.getElementById('cyl-2')];
            const baseLoops = 15; 
            
            const angle0 = currentAngles[0] + (baseLoops * 360) + ((targetNums[0] * anglePerFace) - (currentAngles[0] % 360) + 360) % 360;
            const angle1 = currentAngles[1] + ((baseLoops + 2) * 360) + ((targetNums[1] * anglePerFace) - (currentAngles[1] % 360) + 360) % 360;
            const realAngle2 = currentAngles[2] + ((baseLoops + 4) * 360) + ((targetNums[2] * anglePerFace) - (currentAngles[2] % 360) + 360) % 360;
            const fakeAngle2 = realAngle2 + anglePerFace; 

            const tl = gsap.timeline();

            // 机器整体起动震动
            tl.to(els.machineWrapper, { y: 20, rotationX: 10, duration: 0.1, ease: "power2.in" })
              .to(els.machineWrapper, { y: 0, rotationX: 5, duration: 0.3, ease: "back.out(2)" });

            tl.to(cyls[0], { rotationX: angle0, duration: 2.5, ease: "back.out(1.2)" }, 0);
            tl.to(cyls[1], { rotationX: angle1, duration: 4, ease: "back.out(1.2)" }, 0.5);

            tl.to(cyls[2], { rotationX: fakeAngle2 - 180, duration: 3, ease: "power1.in" }, 0.5);
            tl.to(cyls[2], { rotationX: fakeAngle2 - 36, duration: 2.5, ease: "power2.inOut" });   
            tl.to(cyls[2], { rotationX: fakeAngle2, duration: 1.5, ease: "power4.out" });
            
            tl.to({}, { duration: 1.5 }); 

            // 反转暴击
            tl.to(cyls[2], { rotationX: fakeAngle2 + 12, duration: 0.4, ease: "power1.inOut" });
            tl.to(cyls[2], {
                rotationX: realAngle2, 
                duration: 0.8,        
                ease: "elastic.out(1.2, 0.4)", 
                onStart: () => {
                    gsap.fromTo(els.machineWrapper, 
                        {y: 20, rotationX: 12}, 
                        {y: 0, rotationX: 5, duration: 0.6, ease: "elastic.out(1.5, 0.3)"}
                    );
                    els.flash.style.opacity = '1';
                    try { sfxStorm.pause(); sfxBoom.currentTime = 0; sfxBoom.play(); } catch (e) { }
                },
                onComplete: () => {
                    els.godRays.classList.remove('pulsing');
                    els.flash.style.opacity = '0';
                    State.mode = 'WINNER'; 
                    document.body.classList.add('winner-revealed');

                    spawnExplosion(State.width / 2, State.height / 2, true);
                    setTimeout(() => spawnExplosion(State.width / 2 - 300, State.height / 2, false), 200);
                    setTimeout(() => spawnExplosion(State.width / 2 + 300, State.height / 2, false), 400);

                    currentAngles = [angle0, angle1, realAngle2];
                    
                    setTimeout(() => {
                        els.igniteBtn.innerText = "下 一 位";
                        els.igniteBtn.disabled = false;
                        els.igniteBtn.onclick = resetDraw;
                        isSpinning = false;
                    }, 2000);
                }
            });
        }

        function resetDraw() {
            document.body.classList.remove('winner-revealed');
            els.machineScreen.classList.remove('visible');
            els.glass.classList.remove('visible'); 
            els.title.style.opacity = '1';
            els.title.style.transform = 'translate(-50%, -50%) scale(1)';
            
            els.igniteBtn.innerText = "⚡ 启 动 ⚡";
            els.igniteBtn.onclick = startDraw;

            State.mode = 'IDLE';
            particles = []; 
        }

        function spawnExplosion(x, y, includeConfetti) {
            function spawn(isConfetti) {
                let p;
                if (particlePool.length > 0) { p = particlePool.pop(); p.init(x, y, isConfetti); } 
                else { p = new Particle(x, y, isConfetti); }
                particles.push(p);
            }
            for (let i = 0; i < Config.fireworksCount; i++) { spawn(false); }
            if (includeConfetti) { for (let i = 0; i < Config.confettiCount; i++) { spawn(true); } }
        }

        init();
    </script>
</body>
</html>
