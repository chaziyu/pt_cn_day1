<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>马大灯笼节 - 极限反转抽奖</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-deep: #2b0000;
            --red-bright: #ff1a1a;
            --gold-light: #ffdf00;
            --gold-dark: #b8860b;
            --gold-border: linear-gradient(145deg, #ffd700, #b8860b, #ffd700);
        }

        body {
            margin: 0;
            height: 100vh;
            /* 华丽红丝绒舞台背景 */
            background: radial-gradient(ellipse at center, #5e0000 0%, #1a0000 100%);
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            perspective: 1200px;
        }

        /* 动态背景星火/灯笼光晕飘落效果 */
        .sparks {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, var(--gold-light), rgba(0,0,0,0)),
                radial-gradient(2px 2px at 40px 70px, var(--red-bright), rgba(0,0,0,0)),
                radial-gradient(3px 3px at 50px 160px, var(--gold-light), rgba(0,0,0,0)),
                radial-gradient(2px 2px at 90px 40px, var(--gold-dark), rgba(0,0,0,0)),
                radial-gradient(3px 3px at 130px 80px, var(--red-bright), rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 200px 200px;
            animation: sparks-fall 10s linear infinite;
            opacity: 0.6;
        }

        @keyframes sparks-fall {
            0% { transform: translateY(-200px); }
            100% { transform: translateY(100vh); }
        }

        /* 华丽主标题 */
        .title-container {
            z-index: 10;
            text-align: center;
            margin-bottom: 50px;
        }
        
        .title {
            font-size: 4.5rem;
            color: transparent;
            background: var(--gold-border);
            -webkit-background-clip: text;
            background-clip: text;
            font-weight: 900;
            letter-spacing: 8px;
            text-shadow: 0 10px 20px rgba(0,0,0,0.8);
            margin: 0;
        }

        .subtitle {
            font-size: 1.5rem;
            color: #ffaaaa;
            letter-spacing: 15px;
            margin-top: 10px;
            text-shadow: 0 0 10px var(--red-bright);
        }

        /* 机器主体 - 重金属烫金质感 */
        .machine-wrapper {
            position: relative;
            z-index: 10;
            padding: 30px;
            background: linear-gradient(to bottom, #3a0000, #110000);
            border-radius: 20px;
            box-shadow: 
                0 20px 50px rgba(0,0,0,0.9),
                inset 0 0 0 4px #4a0000,
                inset 0 0 0 8px var(--gold-dark);
            transform-style: preserve-3d;
            transform: rotateX(8deg); /* 微微后仰 */
        }

        /* 机器顶部的发光装饰条 */
        .machine-wrapper::before {
            content: "幸 运 抽 奖";
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--gold-border);
            color: #2b0000;
            padding: 5px 30px;
            font-weight: bold;
            font-size: 1.2rem;
            border-radius: 10px;
            box-shadow: 0 0 20px var(--gold-light);
            letter-spacing: 5px;
        }

        .machine-container {
            display: flex;
            gap: 25px;
            padding: 20px;
            background: #000;
            border-radius: 10px;
            box-shadow: inset 0 0 30px rgba(0,0,0,1);
        }

        /* 单个轮盘视窗 - 玻璃反光质感 */
        .reel-window {
            width: 150px;
            height: 200px;
            background-color: #0a0000;
            border: 4px solid #5a3a00;
            border-radius: 15px;
            position: relative;
            perspective: 800px;
            overflow: hidden;
            box-shadow: 
                inset 0 0 20px var(--red-bright),
                0 0 15px rgba(255, 215, 0, 0.2);
        }

        /* 玻璃弧面反光层 */
        .reel-window::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 50%;
            background: linear-gradient(to bottom, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 100%);
            border-radius: 10px 10px 0 0;
            pointer-events: none;
            z-index: 20;
        }

        /* 上下暗角遮罩，增强 3D 圆柱体进出视线的真实感 */
        .reel-shadow {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, 
                rgba(0,0,0,0.95) 0%, 
                rgba(0,0,0,0) 25%, 
                rgba(0,0,0,0) 75%, 
                rgba(0,0,0,0.95) 100%);
            pointer-events: none;
            z-index: 10;
        }

        /* 3D 圆柱体容器 */
        .cylinder {
            width: 100%;
            height: 100%;
            position: absolute;
            transform-style: preserve-3d;
        }

        /* 数字面板 */
        .face {
            position: absolute;
            width: 150px;
            height: 150px;
            left: 0;
            top: 25px; /* (200 - 150) / 2 居中 */
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 7.5rem;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 15px var(--red-bright), 0 0 30px var(--red-bright);
            backface-visibility: hidden;
        }

        /* 操作台 */
        .controls {
            margin-top: 60px;
            z-index: 10;
        }

        /* 大红灯笼风格按钮 */
        button {
            padding: 20px 60px;
            font-size: 2.2rem;
            font-weight: bold;
            font-family: inherit;
            background: linear-gradient(to bottom, #d90000, #8b0000);
            color: var(--gold-light);
            border: 3px solid var(--gold-light);
            border-radius: 50px;
            cursor: pointer;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            box-shadow: 
                0 10px 0 #4a0000, 
                0 15px 20px rgba(0,0,0,0.6),
                inset 0 0 15px rgba(255, 255, 255, 0.3);
            transition: all 0.1s;
        }

        button:hover {
            filter: brightness(1.2);
            box-shadow: 
                0 10px 0 #4a0000, 
                0 15px 30px rgba(255, 215, 0, 0.4),
                inset 0 0 15px rgba(255, 255, 255, 0.3);
        }

        button:active {
            transform: translateY(10px);
            box-shadow: 
                0 0 0 #4a0000, 
                0 5px 10px rgba(0,0,0,0.6),
                inset 0 0 15px rgba(255, 255, 255, 0.3);
        }

        button:disabled {
            background: #444;
            color: #888;
            border-color: #666;
            box-shadow: 0 10px 0 #222;
            cursor: not-allowed;
            filter: grayscale(1);
            transform: none;
        }

        .win-flash {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 215, 0, 0.3);
            z-index: 999;
            pointer-events: none;
            opacity: 0;
        }
    </style>
</head>
<body>

    <div class="sparks"></div>

    <div class="title-container">
        <h1 class="title">马大灯笼节</h1>
        <div class="subtitle">终 极 抽 奖</div>
    </div>

    <div class="machine-wrapper">
        <div class="machine-container">
            <div class="reel-window">
                <div class="reel-shadow"></div>
                <div class="cylinder" id="cyl-0"></div>
            </div>
            <div class="reel-window">
                <div class="reel-shadow"></div>
                <div class="cylinder" id="cyl-1"></div>
            </div>
            <div class="reel-window">
                <div class="reel-shadow"></div>
                <div class="cylinder" id="cyl-2"></div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button id="start-btn">开 始 抽 奖</button>
    </div>

    <div class="win-flash" id="flash"></div>

    <script>
        // ==========================================
        // 音效占位符
        // ==========================================
        const audios = { 
            fastReel: new Audio('fastReel.mp3'),
            stop1: new Audio('stop1.mp3'),
            stop2: new Audio('stop2.mp3'),
            struggle: new Audio('struggle.mp3'),
            fakeStop: new Audio('fakeStop.mp3'),
            snapBack: new Audio('snapBack.mp3'),
            win: new Audio('win.mp3')
        };

        // ==========================================
        // 3D 几何初始化
        // ==========================================
        const numFaces = 10;
        const anglePerFace = 360 / numFaces; // 36度
        const radius = Math.round((150 / 2) / Math.tan(Math.PI / numFaces)); // 约 230px

        function buildCylinder(cylinderId) {
            const cyl = document.getElementById(`cyl-${cylinderId}`);
            cyl.innerHTML = '';
            gsap.set(cyl, { z: -radius });

            for (let i = 0; i < numFaces; i++) {
                const face = document.createElement('div');
                face.className = 'face';
                face.innerText = i; // 面上数字依次为 0-9
                const rotateX = -i * anglePerFace;
                face.style.transform = `rotateX(${rotateX}deg) translateZ(${radius}px)`;
                cyl.appendChild(face);
            }
        }

        buildCylinder(0);
        buildCylinder(1);
        buildCylinder(2);

        // 初始化到 000
        gsap.set('.cylinder', { rotationX: 0 });

        // ==========================================
        // 核心逻辑：绝对公平的随机与假动作计算
        // ==========================================
        const startBtn = document.getElementById('start-btn');
        let isSpinning = false;

        startBtn.addEventListener('click', () => {
            if (isSpinning) return;
            isSpinning = true;
            
            // 生成三个完全随机的公平数字 (0-9)
            const randomRealNums = [
                Math.floor(Math.random() * 10),
                Math.floor(Math.random() * 10),
                Math.floor(Math.random() * 10)
            ];

            startBtn.disabled = true;
            startBtn.innerText = "抽 奖 中 ...";
            
            audios.fastReel.loop = true;
            audios.fastReel.play().catch(e => {});

            const cyls = [
                document.getElementById('cyl-0'),
                document.getElementById('cyl-1'),
                document.getElementById('cyl-2')
            ];

            // 基础滚动圈数
            const baseLoops = 15; 
            
            // 计算每个圆柱体要旋转的总角度
            // 公式：(圈数 * 360) + (目标数字 * 36度)
            const angle0 = (baseLoops * 360) + (randomRealNums[0] * anglePerFace);
            const angle1 = ((baseLoops + 2) * 360) + (randomRealNums[1] * anglePerFace);
            
            // 个位数（第三个数字）的极限拉扯计算
            const loops3 = baseLoops + 4;
            const realAngle2 = (loops3 * 360) + (randomRealNums[2] * anglePerFace);
            
            // 核心灵魂：假动作角度永远比真实角度多转一格（+36度）。
            // 无论真实数字抽到几（哪怕是9），多转36度就能在视觉上完美呈现出“滚过头一格”的效果，
            // 然后倒退时正好减去36度，暴力退回真实数字！
            const fakeAngle2 = realAngle2 + anglePerFace; 

            const tl = gsap.timeline();

            // 启动后仰蓄力
            tl.to(cyls, { rotationX: -20, duration: 0.3, ease: "power1.inOut" });

            // 百位定格
            tl.to(cyls[0], {
                rotationX: angle0, duration: 2.5, ease: "back.out(1.2)",
                onComplete: () => { audios.stop1.play().catch(e=>{}); }
            });

            // 十位定格
            tl.to(cyls[1], {
                rotationX: angle1, duration: 4, ease: "back.out(1.5)",
                onComplete: () => { 
                    audios.fastReel.pause(); 
                    audios.stop2.play().catch(e=>{}); 
                    audios.struggle.play().catch(e=>{}); 
                }
            }, "<0.5");

            // 个位：假动作与暴力反转
            // A. 极速滚
            tl.to(cyls[2], { rotationX: fakeAngle2 - 180, duration: 3, ease: "power1.in" }, 0.3);
            
            // B. 卡壳摩擦
            tl.to(cyls[2], { rotationX: fakeAngle2 - 72, duration: 1.5, ease: "power2.inOut" }); 
            tl.to(cyls[2], { rotationX: fakeAngle2 - 36, duration: 2, ease: "power1.inOut" });   
            
            // C. 完美假停顿（停在多转一格的位置）
            tl.to(cyls[2], { 
                rotationX: fakeAngle2, 
                duration: 1.5, 
                ease: "power4.out",
                onComplete: () => {
                    audios.struggle.pause();
                    audios.fakeStop.play().catch(e=>{});
                }
            });

            // 屏息停顿 2 秒
            tl.to({}, { duration: 2 });

            // 巅峰暴力反转：极其生硬地减去36度，退回真实中奖号码！
            tl.to(cyls[2], {
                rotationX: realAngle2, 
                duration: 0.1,        
                ease: "back.out(4)",  
                onStart: () => { audios.snapBack.play().catch(e=>{}); },
                onComplete: () => {
                    audios.win.play().catch(e=>{});
                    triggerWinEffects();
                    // 状态重置
                    setTimeout(() => {
                        startBtn.innerText = "重 新 抽 奖";
                        startBtn.disabled = false;
                        isSpinning = false;
                        
                        // 为了下一次能继续往上转，我们把当前角度重置为基础数字的角度（去掉圈数带来的大数值）
                        gsap.set(cyls[0], {rotationX: randomRealNums[0] * anglePerFace});
                        gsap.set(cyls[1], {rotationX: randomRealNums[1] * anglePerFace});
                        gsap.set(cyls[2], {rotationX: randomRealNums[2] * anglePerFace});
                        
                        // 解绑上次的点击，并重新绑定页面刷新（或者你可以改成不刷新，直接再次执行动画）
                        startBtn.onclick = () => location.reload();
                    }, 1000);
                }
            });
        });

        function triggerWinEffects() {
            gsap.to("#flash", { opacity: 1, duration: 0.1, yoyo: true, repeat: 5 });
            gsap.to(".machine-wrapper", {
                boxShadow: "0 0 80px #ffd700, inset 0 0 60px #ff0000",
                duration: 0.2, yoyo: true, repeat: -1
            });
            var end = Date.now() + 5000;
            (function frame() {
                confetti({
                    particleCount: 10, angle: 60, spread: 80, origin: { x: 0, y: 0.8 },
                    colors: ['#ff1a1a', '#ffd700', '#ffffff'] 
                });
                confetti({
                    particleCount: 10, angle: 120, spread: 80, origin: { x: 1, y: 0.8 },
                    colors: ['#ff1a1a', '#ffd700', '#ffffff']
                });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }
    </script>
</body>
</html>
